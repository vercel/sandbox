name: Publish

on:
  push:
    branches:
      - main
      - drives-beta
  pull_request:

env:
  TURBO_TOKEN: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}
  TURBO_TEAM: vercel

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24.16.0"
          cache: "pnpm"

      - run: pnpm install
        shell: bash

      - name: Build Monorepo
        run: pnpm run build

      - name: Run tests
        run: pnpm test

      - name: Verify beta pre-release mode
        if: github.ref == 'refs/heads/drives-beta'
        run: |
          if [ ! -f .changeset/pre.json ]; then
            echo "ERROR: .changeset/pre.json not found. drives-beta must be in changeset pre-release mode."
            exit 1
          fi
          TAG=$(jq -r '.tag' .changeset/pre.json)
          if [ "$TAG" != "beta" ]; then
            echo "ERROR: Expected pre-release tag 'beta', got '$TAG'."
            exit 1
          fi
          echo "Verified: changeset pre-release mode is active with tag 'beta'."

      - name: Create Release Pull Request
        uses: changesets/action@v1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/drives-beta'
        id: changesets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: pnpm version:prepare
          publish: pnpm release
          commitMode: github-api

      - name: Trigger Vercel CLI Sandbox Sync
        if: github.ref == 'refs/heads/main' && steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          github-token: ${{ secrets.VERCEL_CLI_RELEASE_BOT_TOKEN }}
          script: |
            const publishedPackages = JSON.parse(
              process.env.PUBLISHED_PACKAGES || '[]'
            );
            const sandboxPackage = publishedPackages.find(
              pkg => pkg.name === 'sandbox'
            );

            if (!sandboxPackage) {
              console.log('sandbox was not published, skipping CLI sync.');
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: 'vercel',
              repo: 'vercel',
              workflow_id: 'update-sandbox.yml',
              ref: 'main',
              inputs: {
                version: sandboxPackage.version,
                source_repository: `${context.repo.owner}/${context.repo.repo}`,
                source_run_id: String(context.runId),
              },
            });
